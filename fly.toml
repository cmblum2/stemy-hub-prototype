# fly.toml app configuration file generated for stemy-hub on 2026-02-23T12:31:58-06:00

app = 'stemy-hub'
primary_region = 'ord'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']
  

[mounts]
  source = "stemy_data"
  destination = "/data"
  min_machines_running = 1

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024